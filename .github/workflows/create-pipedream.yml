name: Test Pipedream Secret
on: [workflow_dispatch]

jobs:
  test-secret:
    runs-on: ubuntu-latest
    steps:
    - name: Check Secrets
      env:
        CLIENT_SECRET: ${{ secrets.PIPEdream_CLIENT_SECRET }}
      run: |
        if [ -z "$CLIENT_SECRET" ] || [ "$CLIENT_SECRET" = "undefined" ]; then
          echo "❌ PIPEdream_CLIENT_SECRET خالی یا تنظیم نشده!"
          exit 1
        fi
        
        echo "✅ Secret موجوده (طول: ${#CLIENT_SECRET})"
        echo "🔍 Test API..."
        
        RESPONSE=$(curl -s -w "\n%{http_code}" \
        -H "Authorization: Bearer $CLIENT_SECRET" \
        https://api.pipedream.com/v1/me)
        
        HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
        BODY=$(echo "$RESPONSE" | head -n -1)
        
        echo "HTTP: $HTTP_CODE"
        echo "Response: $BODY"
        
        if [ "$HTTP_CODE" = "200" ]; then
          echo "✅ Secret درسته!"
        else
          echo "❌ Secret اشتباهه!"
        fi
