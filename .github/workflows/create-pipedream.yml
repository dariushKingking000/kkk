name: Create Pipedream Workflow
on: [workflow_dispatch]

jobs:
  create-workflow:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Create Pipedream Workflow
      env:
        WORKSPACE_ID: ${{ secrets.PIPEdream_WORKSPACE_ID }}  # zwiRg4
        CLIENT_ID: ${{ secrets.PIPEdream_CLIENT_ID }}       # kingking00
        CLIENT_SECRET: ${{ secrets.PIPEdream_CLIENT_SECRET }}
      run: |
        curl -X POST "https://api.pipedream.com/v1/workflows" \
        -H "Authorization: Bearer $CLIENT_SECRET" \
        -H "Content-Type: application/json" \
        -d '{
          "name": "My Auto Workflow",
          "workspace_id": "$WORKSPACE_ID",
          "source": "github://user/repo/path/to/workflow.js"
        }'
