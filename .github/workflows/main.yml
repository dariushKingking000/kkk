name: Download Wush Binary to Repo

on:
  workflow_dispatch:

jobs:
  download-wush:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Get latest Wush download URL and download
        run: |
          # از API گیتهاب آخرین آدرس دانلود رو میگیره
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/coder/wush/releases/latest | grep -o "https://github.com/coder/wush/releases/download/.*/wush_.*_windows_amd64.exe" | head -1)
          
          echo "Downloading from: $DOWNLOAD_URL"
          curl -L -o wush.exe "$DOWNLOAD_URL"
          
          # چک کن که فایل دانلود شده یا نه
          ls -la wush.exe
          file wush.exe
      
      - name: Commit and push to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wush.exe
          git commit -m "Add wush.exe binary [skip ci]" || echo "No changes to commit"
          git push
