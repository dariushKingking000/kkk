name: Download Wush Binary

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Download and extract Wush for Windows AMD64
        run: |
          # دانلود فایل زیپ مخصوص ویندوز 64 بیتی
          curl -L -o wush.zip "https://github.com/coder/wush/releases/download/v0.4.1/wush_0.4.1_windows_amd64.zip"
          
          # استخراج فایل wush.exe از داخل زیپ
          unzip -o wush.zip
          
          # پیدا کردن فایل exe و انتقال به ریشه
          find . -name "wush.exe" -exec mv {} ./wush.exe \; 2>/dev/null || true
          
          # پاک کردن فایل زیپ
          rm -f wush.zip
          
          # حذف پوشه‌های اضافی
          rm -rf wush_* 2>/dev/null || true
          
          # چک کن که فایل هست
          echo "✅ فایل wush.exe دانلود و استخراج شد:"
          ls -la wush.exe
      
      - name: Commit and push to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wush.exe
          git commit -m "Add wush.exe for Windows AMD64 [skip ci]" || echo "No changes to commit"
          git push
