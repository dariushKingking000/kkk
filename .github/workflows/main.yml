name: Screenshot Bot
on: 
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Create .gitignore FIRST
      run: |
        cat > .gitignore << EOF
        node_modules/
        bot.js
        package.json
        package-lock.json
        command.txt
        last_command.txt
        command_pipe.txt
        response.txt
        EOF
    
    - name: Install Chrome + FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y wget gnupg xvfb x11-xkb-utils ffmpeg bc
        wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
    
    - name: Install Node deps
      run: npm init -y && npm i puppeteer@latest
    
    - name: Setup Bot
      run: |
        cat > bot.js << 'EOF'
        const puppeteer = require("puppeteer");
        const fs = require("fs");
        const { execSync } = require("child_process");
        
        let browser = null;
        let page = null;
        
        function wait(ms) {
          return new Promise(resolve => setTimeout(resolve, ms));
        }
        
        async function initBrowser() {
          console.log("рџљЂ Ш±Ш§Щ‡вЂЊШ§Щ†ШЇШ§ШІЫЊ...");
          browser = await puppeteer.launch({
            headless: false,
            executablePath: '/usr/bin/google-chrome-stable',
            args: [
              '--no-sandbox','--disable-setuid-sandbox','--disable-dev-shm-usage',
              '--no-first-run','--no-service-autorun',
              '--password-store=basic','--window-size=1920,1080'
            ]
          });
          
          page = await browser.newPage();
          await page.setViewport({ width: 1920, height: 1080 });
          await page.goto("https://pipedream.com/auth/signup", { waitUntil: 'networkidle0', timeout: 60000 });
          await wait(5000);
          console.log("вњ… ШўЩ…Ш§ШЇЩ‡!");
        }
        
        async function takeScreenshot() {
          console.log("рџ“ё Screenshot...");
          await page.screenshot({ path: 'screenshot.png', type: 'png' });
          await page.screenshot({ path: 'screenshot-full.png', fullPage: true, type: 'png' });
          const buffer = await page.screenshot({ type: 'png' });
          fs.writeFileSync("screenshot-base64.txt", buffer.toString('base64'));
        }
        
        async function executeCommand(cmd) {
          console.log(`рџ”§ ${cmd}`);
          if (cmd.startsWith("click ")) {
            const [x, y] = cmd.slice(6).trim().split(",").map(Number);
            await page.mouse.click(x, y);
          } else if (cmd.startsWith("type ")) {
            const text = cmd.slice(5).trim();
            await page.keyboard.type(text);
          } else if (cmd === "enter") {
            await page.keyboard.press('Enter');
          } else if (cmd === "copy") {
            const text = await page.evaluate(() => document.body.innerText);
            fs.writeFileSync('page-text.txt', text);
            console.log("вњ… Copy OK!");
          }
        }
        
        async function recordVideo(commands) {
          console.log("рџЋҐ Video...");
          const uniqueId = Date.now();
          
          if (fs.existsSync('frames')) fs.rmSync('frames', { recursive: true });
          fs.mkdirSync('frames');
          
          let frame = 0;
          for(let cmd of commands) {
            // 3 pre frames
            for(let i = 0; i < 3; i++) {
              await page.screenshot({ path: `frames/f${frame.toString().padStart(5,'0')}.png` });
              frame++;
              await wait(500);
            }
            
            await executeCommand(cmd);
            
            // 7 post frames
            for(let i = 0; i < 7; i++) {
              await page.screenshot({ path: `frames/f${frame.toString().padStart(5,'0')}.png` });
              frame++;
              await wait(500);
            }
          }
          
          await takeScreenshot();
          
          const video = `video_${uniqueId}.mp4`;
          execSync(`ffmpeg -y -r 12 -i frames/f%05d.png -c:v libx264 -crf 23 -pix_fmt yuv420p ${video}`);
          console.log(`вњ… Video: ${fs.statSync(video).size/1024/1024}MB`);
          
          fs.rmSync('frames', { recursive: true });
        }
        
        (async () => {
          await initBrowser();
          while(true) {
            if (fs.existsSync('command_pipe.txt')) {
              let cmd = fs.readFileSync('command_pipe.txt', 'utf8').trim();
              console.log(`рџ†• ${cmd}`);
              
              if (cmd === "exit") process.exit(0);
              
              let commands = cmd.split('\n').map(l=>l.trim()).filter(l=>l);
              await recordVideo(commands);
              fs.writeFileSync('response.txt', `вњ… ${commands.length} OK`);
              fs.unlinkSync('command_pipe.txt');
            }
            await wait(500);
          }
        })();
        EOF
    
    - name: Bot LOOP
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        export DISPLAY=:99
        Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
        
        git config --global user.name "Screenshot Bot"
        git config --global user.email "bot@github.com"
        
        rm -f *txt *png *mp4
        
        timeout 7200 node bot.js &
        PID=$!
        echo "рџ¤– $PID"
        sleep 30
        
        while true; do
          git fetch origin
          git reset --hard origin/main
          
          if [ -f command.txt ]; then
            CONTENT=$(cat command.txt)
            LAST=$(cat last_command.txt 2>/dev/null || echo "")
            
            if [ "$CONTENT" != "$LAST" ] && [ "$CONTENT" != "exit" ]; then
              echo "рџ†• $CONTENT"
              rm -f command_pipe.txt response.txt *png *mp4 *txt
              echo "$CONTENT" > command_pipe.txt
              
              for i in {1..300}; do
                [ -f response.txt ] && {
                  cat response.txt
                  rm -f response.txt command_pipe.txt
                  break
                }
                sleep 1
              done
              
              # Files check
              FILES=""
              for f in screenshot-full.png screenshot.png screenshot-base64.txt video_*.mp4 page-text.txt; do
                [ -f "$f" ] && FILES="$FILES $f"
              done
              
              [ -n "$FILES" ] && {
                echo "рџ“Ѓ $FILES"
                
                git add -f $FILES
                git add -f .gitignore bot.js
                
                if ! git diff --staged --quiet; then
                  git commit -m "рџЋҐ Screenshot + Video | $(date +'%H:%M')"
                  git push origin main -f
                  echo "вњ… PUSH OK!"
                fi
              }
              
              echo "$CONTENT" > last_command.txt
            fi
            rm -f command.txt
          fi
          
          sleep 10
        done
